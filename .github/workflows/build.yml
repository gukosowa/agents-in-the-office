name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0) — leave empty to auto-increment patch'
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
          - os: ubuntu-22.04
            label: linux-x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3  # v2.1.2

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable, 2026-02-12
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2
        with:
          workspaces: src-tauri

      - run: bun install

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Update tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > /tmp/tauri.conf.json && \
            mv /tmp/tauri.conf.json src-tauri/tauri.conf.json
          # Update Cargo.toml (first [package] version field)
          sed -i "0,/^version = .*/s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # Only set APPLE_SIGNING_IDENTITY when the secret is configured — setting it
      # to an empty string causes codesign to fail rather than skip signing.
      # To enable macOS code signing and notarization, add repository secrets:
      #   APPLE_SIGNING_IDENTITY, APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
      #   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
      - name: Configure macOS code signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$SIGNING_IDENTITY" ]; then
            echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: bun run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            latest=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq '.tag_name' 2>/dev/null || echo "v0.0.0")
            IFS='.' read -r major minor patch <<< "${latest#v}"
            TAG="v${major}.${minor}.$((patch + 1))"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        run: |
          readarray -d '' -t files < <(find artifacts -type f -print0)
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            "${files[@]}"
        env:
          GH_TOKEN: ${{ github.token }}
